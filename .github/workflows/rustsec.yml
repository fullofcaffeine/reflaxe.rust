name: RustSec Audit

on:
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC
  workflow_dispatch: {}

concurrency:
  group: rustsec-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Rust toolchain policy
        id: rust-policy
        run: node scripts/ci/rust-toolchain-policy.js --github-output --activate release

      - name: Setup reproducible release Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ steps.rust-policy.outputs.release }}

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo audit
        run: |
          set -euo pipefail
          cargo audit
