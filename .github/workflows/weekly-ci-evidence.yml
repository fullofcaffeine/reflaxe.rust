name: Weekly CI Evidence

on:
  schedule:
    - cron: "0 10 * * 1" # Mondays 10:00 UTC
  workflow_dispatch: {}

concurrency:
  group: weekly-ci-evidence-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  HAXE_VERSION: "4.3.7"
  CARGO_NET_RETRY: "5"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  local-equivalent:
    name: Weekly local CI equivalent (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Cache Haxe toolchain (lix)
        uses: actions/cache@v4
        with:
          path: |
            ~/haxe
          key: ${{ runner.os }}-lix-haxe-${{ env.HAXE_VERSION }}-${{ hashFiles('.haxerc', 'haxe_libraries/*.hxml', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-lix-haxe-${{ env.HAXE_VERSION }}-

      - name: Install Haxe (pinned via lix)
        run: |
          set -euo pipefail
          npx lix download
          npx lix download haxe "${{ env.HAXE_VERSION }}"
          npx lix use haxe "${{ env.HAXE_VERSION }}"
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          haxe -version

      - name: Setup Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Free runner disk space (before harness)
        run: |
          set -euo pipefail
          echo "[disk] before cleanup"
          df -h
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          echo "[disk] after cleanup"
          df -h

      - name: Verify docs sync state
        run: |
          set -euo pipefail
          npm run docs:sync:progress
          npm run docs:sync:evidence
          git diff --exit-code -- docs/progress-tracker.md docs/vision-vs-implementation.md
          git diff --exit-code -- docs/semantic-confidence-summary.json docs/semantic-confidence-summary.md

      - name: Run full local CI equivalent
        run: |
          set -euo pipefail
          HARNESS_CLEAN_OUTPUTS=1 HARNESS_CLEAN_CACHE=1 \
          HXRT_PERF_GATE_MODE=nightly \
          HXRT_PERF_HOT_LOOP_INPROC_RUNS=60 \
          HXRT_PERF_HOT_LOOP_NO_HXRT_INPROC_RUNS=60 \
          bash scripts/ci/local.sh

      - name: Verify portable stdlib candidate coverage
        run: |
          set -euo pipefail
          npm run guard:stdlib-candidates
          npm run guard:stdlib-candidate-gap
          mkdir -p .cache/weekly-evidence
          node scripts/ci/audit-upstream-stdlib-candidates.js --json > .cache/weekly-evidence/portable-stdlib-candidates.json
          node scripts/ci/generate-semantic-confidence-summary.js --write --out-dir .cache/weekly-evidence

      - name: Upload portable stdlib candidate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portable-stdlib-candidates
          path: .cache/weekly-evidence/portable-stdlib-candidates.json
          if-no-files-found: warn

      - name: Upload semantic confidence summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-confidence-summary
          path: |
            .cache/weekly-evidence/semantic-confidence-summary.json
            .cache/weekly-evidence/semantic-confidence-summary.md
          if-no-files-found: warn

      - name: Publish Linux evidence summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          semantic_counts="$(node <<'NODE'
          const fs = require('fs')
          const summaryPath = '.cache/weekly-evidence/semantic-confidence-summary.json'
          if (!fs.existsSync(summaryPath)) {
            console.log('- Semantic confidence artifact: unavailable; evidence generation did not complete.')
            process.exit(0)
          }
          const report = JSON.parse(fs.readFileSync(summaryPath, 'utf8'))
          console.log('- Semantic confidence artifact: `semantic-confidence-summary`')
          console.log(`- Tier2 inventory: \`${report.counts.tier2SweepModules}\` modules; portable candidates covered: \`${report.counts.portableCandidateCoveredInTier2}\` / \`${report.counts.portableCandidateImportableModules}\``)
          console.log(`- Targeted semantic buckets: \`${report.counts.bucketsByClass.targeted_semantic_parity}\``)
          console.log(`- Snapshot/smoke-only buckets: \`${report.counts.bucketsByClass.snapshot_or_smoke_only}\``)
          console.log(`- Portable semantic-diff cases: \`${report.counts.portableSemanticDiffCases}\`; lane cases: \`${report.counts.laneSemanticDiffCases}\``)
          NODE
          )"
          {
            echo "## Weekly CI Evidence (Linux local equivalent)"
            echo "- Result: ${JOB_STATUS}"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Run: ${run_url}"
            echo "- Commands:"
            echo "  - \`npm run docs:sync:progress\`"
            echo "  - \`HXRT_PERF_GATE_MODE=nightly HXRT_PERF_HOT_LOOP_INPROC_RUNS=60 HXRT_PERF_HOT_LOOP_NO_HXRT_INPROC_RUNS=60 bash scripts/ci/local.sh\`"
            echo "  - \`npm run guard:stdlib-candidates\`"
            echo "  - \`npm run guard:stdlib-candidate-gap\`"
            printf '%s\n' "${semantic_counts}"
          } >> "$GITHUB_STEP_SUMMARY"

  windows-smoke:
    name: Weekly Windows smoke
    runs-on: windows-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install npm dependencies
        shell: bash
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install Haxe (pinned via lix)
        shell: bash
        run: |
          set -euo pipefail
          npx lix download
          npx lix download haxe "${{ env.HAXE_VERSION }}"
          npx lix use haxe "${{ env.HAXE_VERSION }}"
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          haxe -version

      - name: Setup Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Run Windows smoke harness
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/windows-smoke.sh

      - name: Publish Windows evidence summary
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "## Weekly CI Evidence (Windows smoke)"
            echo "- Result: ${JOB_STATUS}"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Run: ${run_url}"
            echo "- Command: \`bash scripts/ci/windows-smoke.sh\`"
          } >> "$GITHUB_STEP_SUMMARY"

  codex-hxrust-qa:
    name: Weekly codex-hxrust killer-app QA
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout haxe.rust
        uses: actions/checkout@v5
        with:
          path: haxe.rust

      - name: Clone codex-hxrust
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/fullofcaffeine/codex-hxrust.git codex-hxrust

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            haxe.rust/package-lock.json
            codex-hxrust/package-lock.json

      - name: Install npm dependencies
        run: |
          set -euo pipefail
          npm ci --prefix haxe.rust --ignore-scripts --no-audit --no-fund
          npm ci --prefix codex-hxrust --ignore-scripts --no-audit --no-fund

      - name: Cache Haxe toolchain (lix)
        uses: actions/cache@v4
        with:
          path: |
            ~/haxe
          key: ${{ runner.os }}-lix-haxe-codex-hxrust-${{ env.HAXE_VERSION }}-${{ hashFiles('haxe.rust/.haxerc', 'haxe.rust/haxe_libraries/*.hxml', 'haxe.rust/package-lock.json', 'codex-hxrust/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-lix-haxe-codex-hxrust-${{ env.HAXE_VERSION }}-
            ${{ runner.os }}-lix-haxe-${{ env.HAXE_VERSION }}-

      - name: Install Haxe (pinned via lix)
        working-directory: haxe.rust
        run: |
          set -euo pipefail
          npx lix download
          npx lix download haxe "${{ env.HAXE_VERSION }}"
          npx lix use haxe "${{ env.HAXE_VERSION }}"
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          echo "$(pwd)/../codex-hxrust/node_modules/.bin" >> "$GITHUB_PATH"
          export PATH="$(pwd)/node_modules/.bin:$(pwd)/../codex-hxrust/node_modules/.bin:$PATH"
          haxe -version

      - name: Setup Rust (stable + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Run codex-hxrust generated Cargo QA
        working-directory: haxe.rust
        run: |
          set -euo pipefail
          npm run test:codex-hxrust

      - name: Publish codex-hxrust evidence summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          haxe_rust_sha="$(git -C haxe.rust rev-parse --short HEAD 2>/dev/null || echo unknown)"
          codex_hxrust_sha="$(git -C codex-hxrust rev-parse --short HEAD 2>/dev/null || echo unknown)"
          {
            echo "## Weekly CI Evidence (codex-hxrust)"
            echo "- Result: ${JOB_STATUS}"
            echo "- haxe.rust commit: \`${haxe_rust_sha}\`"
            echo "- codex-hxrust commit: \`${codex_hxrust_sha}\`"
            echo "- Run: ${run_url}"
            echo "- Command: \`npm run test:codex-hxrust\`"
          } >> "$GITHUB_STEP_SUMMARY"

  follow-up-guidance:
    name: Weekly evidence guidance
    runs-on: ubuntu-latest
    if: always()
    needs:
      - local-equivalent
      - windows-smoke
      - codex-hxrust-qa
    steps:
      - name: Publish follow-up instructions
        run: |
          set -euo pipefail
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          linux_status="${{ needs.local-equivalent.result }}"
          windows_status="${{ needs.windows-smoke.result }}"
          codex_status="${{ needs.codex-hxrust-qa.result }}"

          {
            echo "## Weekly CI Evidence Rollup"
            echo "- Linux local-equivalent job: **${linux_status}**"
            echo "- Windows smoke job: **${windows_status}**"
            echo "- codex-hxrust QA job: **${codex_status}**"
            echo "- Run URL: ${run_url}"
            echo ""
            if [[ "${linux_status}" != "success" || "${windows_status}" != "success" || "${codex_status}" != "success" ]]; then
              echo "### Action Required"
              echo "Open a regression issue in the tracker the same day, assign an owner, and include:"
              echo "- failing job + failing step"
              echo "- run URL + relevant log excerpt"
              echo "- expected behavior vs actual behavior"
              echo "- mitigation plan and target date"
            else
              echo "No follow-up issue is required for this weekly run."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
