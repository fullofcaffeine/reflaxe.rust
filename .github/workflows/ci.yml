name: CI

on:
  push:
    branches: [ main ]
  pull_request: {}
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  # Never cancel a main run that may already be publishing. Normal branch/PR runs still supersede
  # older work for the same ref.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  NODE_VERSION: "22.14.0"
  HAXE_VERSION: "4.3.7"

jobs:
  security:
    name: Release dependency + secret audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup exact Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Audit locked release dependencies
        run: |
          set -euo pipefail
          npm ci --ignore-scripts --no-audit --no-fund
          npm audit

      - name: Install gitleaks
        run: |
          set -euo pipefail
          version="8.21.2"
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Run gitleaks (all history)
        run: |
          set -euo pipefail
          bash scripts/security/run-gitleaks.sh

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Review dependencies
        uses: actions/dependency-review-action@v4

  rust-tooling:
    name: Rust minimum (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Rust toolchain policy
        id: rust-policy
        run: node scripts/ci/rust-toolchain-policy.js --github-output --activate minimum

      - name: Setup minimum Rust + rustfmt + clippy
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ steps.rust-policy.outputs.minimum }}
          components: rustfmt, clippy

      - name: cargo fmt (workspace)
        run: |
          set -euo pipefail
          cargo fmt --check --all

      - name: cargo clippy (workspace)
        run: |
          set -euo pipefail
          cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Prove fresh dependency resolution at the Rust floor
        run: node scripts/ci/fresh-cargo-resolution.js --lane minimum --check-baseline --out-dir .cache/fresh-cargo-resolution/minimum

      - name: Archive minimum fresh-resolution evidence
        uses: actions/upload-artifact@v4
        with:
          name: fresh-cargo-resolution-minimum
          path: .cache/fresh-cargo-resolution/minimum
          if-no-files-found: error
          retention-days: 14

  rust-current-stable:
    name: Rust current stable compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Rust toolchain policy
        id: rust-policy
        run: node scripts/ci/rust-toolchain-policy.js --github-output --activate current

      - name: Setup current stable Rust + rustfmt + clippy
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ steps.rust-policy.outputs.current }}
          components: rustfmt, clippy

      - name: Check workspace on current stable
        run: |
          set -euo pipefail
          rustc --version --verbose
          cargo fmt --check --all
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked
          generated_smoke="$(mktemp -d)"
          generated_clippy="$(mktemp -d)"
          trap 'rm -rf "$generated_smoke" "$generated_clippy"' EXIT
          cp -R test/snapshot/v1_smoke/intended/. "$generated_smoke/"
          cargo check --manifest-path "$generated_smoke/Cargo.toml"
          cp -R test/snapshot/deny_warnings/intended/. "$generated_clippy/"
          cargo clippy --manifest-path "$generated_clippy/Cargo.toml" --all-targets -- \
            -A clippy::all -D clippy::correctness -D clippy::suspicious

      - name: Prove fresh dependency resolution on current stable
        run: node scripts/ci/fresh-cargo-resolution.js --lane current --check-baseline --out-dir .cache/fresh-cargo-resolution/current

      - name: Archive current-stable fresh-resolution evidence
        uses: actions/upload-artifact@v4
        with:
          name: fresh-cargo-resolution-current
          path: .cache/fresh-cargo-resolution/current
          if-no-files-found: error
          retention-days: 14

  windows-smoke:
    name: Windows smoke (fmt + clippy + sys IO/net)
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install npm dependencies
        shell: bash
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install Haxe (pinned via lix)
        shell: bash
        run: |
          set -euo pipefail
          npx lix download
          npx lix download haxe "${{ env.HAXE_VERSION }}"
          npx lix use haxe "${{ env.HAXE_VERSION }}"
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          haxe -version

      - name: Resolve Rust toolchain policy
        id: rust-policy
        shell: bash
        run: node scripts/ci/rust-toolchain-policy.js --github-output --activate minimum

      - name: Setup minimum Rust + rustfmt + clippy
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ steps.rust-policy.outputs.minimum }}
          components: rustfmt, clippy

      - name: cargo fmt (workspace)
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check --all

      - name: cargo clippy (workspace)
        shell: bash
        run: |
          set -euo pipefail
          cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run Windows smoke harness
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/windows-smoke.sh

  rustsec-audit:
    name: RustSec audit (cargo-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Rust toolchain policy
        id: rust-policy
        run: node scripts/ci/rust-toolchain-policy.js --github-output --activate minimum

      - name: Setup minimum Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ steps.rust-policy.outputs.minimum }}

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo audit
        run: |
          set -euo pipefail
          cargo audit

  harness-snapshots:
    name: Harness / snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run repo guard scripts
        run: npm run hooks:check

      - name: Cache Haxe toolchain (lix)
        uses: actions/cache@v4
        with:
          path: |
            ~/haxe
          key: ${{ runner.os }}-lix-haxe-${{ env.HAXE_VERSION }}-${{ hashFiles('.haxerc', 'haxe_libraries/*.hxml', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-lix-haxe-${{ env.HAXE_VERSION }}-

      - name: Install Haxe (pinned via lix)
        run: |
          set -euo pipefail
          # `npm ci --ignore-scripts` skips postinstall; fetch the toolchain explicitly (incl. neko).
          npx lix download
          npx lix download haxe "${{ env.HAXE_VERSION }}"
          npx lix use haxe "${{ env.HAXE_VERSION }}"
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          haxe -version

      - name: Resolve Rust toolchain policy
        id: rust-policy
        run: node scripts/ci/rust-toolchain-policy.js --github-output --activate minimum

      - name: Setup minimum Rust + rustfmt + clippy
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ steps.rust-policy.outputs.minimum }}
          components: rustfmt, clippy

      - name: Free runner disk space (before harness)
        run: |
          set -euo pipefail
          echo "[disk] before cleanup"
          df -h
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          echo "[disk] after cleanup"
          df -h

      - name: Run snapshots harness shard
        run: |
          set -euo pipefail
          HARNESS_STAGES=snapshots HARNESS_SNAPSHOT_JOBS=6 HARNESS_CLEAN_OUTPUTS=1 HARNESS_CLEAN_CACHE=1 bash scripts/ci/harness.sh

  harness-conformance-policy:
    name: Harness / conformance + policy
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Cache Haxe toolchain (lix)
        uses: actions/cache@v4
        with:
          path: |
            ~/haxe
          key: ${{ runner.os }}-lix-haxe-${{ env.HAXE_VERSION }}-${{ hashFiles('.haxerc', 'haxe_libraries/*.hxml', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-lix-haxe-${{ env.HAXE_VERSION }}-

      - name: Install Haxe (pinned via lix)
        run: |
          set -euo pipefail
          npx lix download
          npx lix download haxe "${{ env.HAXE_VERSION }}"
          npx lix use haxe "${{ env.HAXE_VERSION }}"
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          haxe -version

      - name: Resolve Rust toolchain policy
        id: rust-policy
        run: node scripts/ci/rust-toolchain-policy.js --github-output --activate minimum

      - name: Setup minimum Rust + rustfmt + clippy
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ steps.rust-policy.outputs.minimum }}
          components: rustfmt, clippy

      - name: Capture portable stdlib candidate report
        run: |
          set -euo pipefail
          mkdir -p .cache/ci-evidence
          node scripts/ci/audit-upstream-stdlib-candidates.js --json > .cache/ci-evidence/portable-stdlib-candidates.json

      - name: Capture semantic confidence summary artifacts
        run: |
          set -euo pipefail
          mkdir -p .cache/ci-evidence
          node scripts/ci/generate-semantic-confidence-summary.js --write --out-dir .cache/ci-evidence

      - name: Run conformance + policy harness shard
        run: |
          set -euo pipefail
          HARNESS_STAGES="conformance policy" HARNESS_CLEAN_OUTPUTS=1 HARNESS_CLEAN_CACHE=1 bash scripts/ci/harness.sh

      - name: Upload portable stdlib candidate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portable-stdlib-candidates
          path: .cache/ci-evidence/portable-stdlib-candidates.json
          if-no-files-found: warn

      - name: Upload semantic confidence summary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-confidence-summary
          path: |
            .cache/ci-evidence/semantic-confidence-summary.json
            .cache/ci-evidence/semantic-confidence-summary.md
          if-no-files-found: warn

      - name: Publish semantic confidence summary
        if: always()
        run: |
          set -euo pipefail
          node - <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs')
          const report = JSON.parse(fs.readFileSync('.cache/ci-evidence/semantic-confidence-summary.json', 'utf8'))
          console.log('## Semantic Confidence Summary')
          console.log(`- Tier2 inventory: \`${report.counts.tier2SweepModules}\` modules`)
          console.log(`- Portable candidates covered in Tier2: \`${report.counts.portableCandidateCoveredInTier2}\` / \`${report.counts.portableCandidateImportableModules}\``)
          console.log(`- Targeted semantic/runtime buckets: \`${report.counts.bucketsByClass.targeted_semantic_parity}\``)
          console.log(`- Snapshot/smoke-only buckets: \`${report.counts.bucketsByClass.snapshot_or_smoke_only}\``)
          console.log(`- Portable semantic-diff cases: \`${report.counts.portableSemanticDiffCases}\`; lane cases: \`${report.counts.laneSemanticDiffCases}\``)
          console.log('- Artifact: `semantic-confidence-summary`')
          NODE

  harness-examples:
    name: Harness / packaging + examples
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Cache Haxe toolchain (lix)
        uses: actions/cache@v4
        with:
          path: |
            ~/haxe
          key: ${{ runner.os }}-lix-haxe-${{ env.HAXE_VERSION }}-${{ hashFiles('.haxerc', 'haxe_libraries/*.hxml', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-lix-haxe-${{ env.HAXE_VERSION }}-

      - name: Install Haxe (pinned via lix)
        run: |
          set -euo pipefail
          npx lix download
          npx lix download haxe "${{ env.HAXE_VERSION }}"
          npx lix use haxe "${{ env.HAXE_VERSION }}"
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          haxe -version

      - name: Resolve Rust toolchain policy
        id: rust-policy
        run: node scripts/ci/rust-toolchain-policy.js --github-output --activate minimum

      - name: Setup minimum Rust + rustfmt + clippy
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ steps.rust-policy.outputs.minimum }}
          components: rustfmt, clippy

      - name: Package smoke (haxelib zip install)
        run: |
          set -euo pipefail
          bash scripts/ci/package-smoke.sh

      - name: Free runner disk space (before harness)
        run: |
          set -euo pipefail
          echo "[disk] before cleanup"
          df -h
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          echo "[disk] after cleanup"
          df -h

      - name: Run packaging + examples harness shard
        run: |
          set -euo pipefail
          HARNESS_STAGES="packaging examples parity" HARNESS_SKIP_PACKAGE_SMOKE=1 HARNESS_CLEAN_OUTPUTS=1 HARNESS_CLEAN_CACHE=1 bash scripts/ci/harness.sh

  perf-hxrt:
    name: HXRT overhead benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Cache Haxe toolchain (lix)
        uses: actions/cache@v4
        with:
          path: |
            ~/haxe
          key: ${{ runner.os }}-lix-haxe-${{ env.HAXE_VERSION }}-${{ hashFiles('.haxerc', 'haxe_libraries/*.hxml', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-lix-haxe-${{ env.HAXE_VERSION }}-

      - name: Install Haxe (pinned via lix)
        run: |
          set -euo pipefail
          npx lix download
          npx lix download haxe "${{ env.HAXE_VERSION }}"
          npx lix use haxe "${{ env.HAXE_VERSION }}"
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          haxe -version

      - name: Resolve Rust toolchain policy
        id: rust-policy
        run: node scripts/ci/rust-toolchain-policy.js --github-output --activate minimum

      - name: Setup minimum Rust + rustfmt + clippy
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ steps.rust-policy.outputs.minimum }}
          components: rustfmt, clippy

      - name: Run HXRT overhead benchmarks (PR coarse gate)
        run: |
          set -euo pipefail
          HXRT_PERF_HOT_LOOP_INPROC_RUNS=60 \
          HXRT_PERF_HOT_LOOP_NO_HXRT_INPROC_RUNS=60 \
          bash scripts/ci/perf-hxrt-overhead.sh --gate-mode pr

      - name: Upload HXRT overhead benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hxrt-overhead-benchmarks
          path: .cache/perf-hxrt/results
          if-no-files-found: warn

  test:
    name: Snapshots + Examples
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - harness-snapshots
      - harness-conformance-policy
      - harness-examples
      - perf-hxrt
    if: always()
    steps:
      - name: Check harness shard results
        if: always()
        run: |
          set -euo pipefail
          failed=0
          for shard in \
            "harness-snapshots:${{ needs['harness-snapshots'].result }}" \
            "harness-conformance-policy:${{ needs['harness-conformance-policy'].result }}" \
            "harness-examples:${{ needs['harness-examples'].result }}" \
            "perf-hxrt:${{ needs['perf-hxrt'].result }}"
          do
            name="${shard%%:*}"
            result="${shard#*:}"
            echo "[harness-aggregate] ${name}: ${result}"
            if [[ "$result" != "success" ]]; then
              failed=1
            fi
          done

          if [[ "$failed" -ne 0 ]]; then
            echo "[harness-aggregate] one or more harness shards failed"
            exit 1
          fi

          echo "[harness-aggregate] ok"

  tier2-stdlib-sweep:
    name: Tier2 upstream stdlib sweep
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Cache Haxe toolchain (lix)
        uses: actions/cache@v4
        with:
          path: |
            ~/haxe
          key: ${{ runner.os }}-lix-haxe-${{ env.HAXE_VERSION }}-${{ hashFiles('.haxerc', 'haxe_libraries/*.hxml', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-lix-haxe-${{ env.HAXE_VERSION }}-

      - name: Install Haxe (pinned via lix)
        run: |
          set -euo pipefail
          npx lix download
          npx lix download haxe "${{ env.HAXE_VERSION }}"
          npx lix use haxe "${{ env.HAXE_VERSION }}"
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          haxe -version

      - name: Resolve Rust toolchain policy
        id: rust-policy
        run: node scripts/ci/rust-toolchain-policy.js --github-output --activate minimum

      - name: Setup minimum Rust + rustfmt + clippy
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ steps.rust-policy.outputs.minimum }}
          components: rustfmt, clippy

      - name: Run Tier2 upstream stdlib sweep
        run: |
          set -euo pipefail
          bash test/run-upstream-stdlib-sweep.sh --tier tier2

  release:
    name: Release exact CI-tested commit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - security
      - rust-tooling
      - rust-current-stable
      - windows-smoke
      - rustsec-audit
      - test
      - tier2-stdlib-sweep
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    concurrency:
      group: release-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout exact tested commit
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup exact Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22.14.0"

      - name: Install locked npm dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install Haxe 4.3.7
        run: |
          set -euo pipefail
          npx lix download
          npx lix download haxe "${{ env.HAXE_VERSION }}"
          npx lix use haxe "${{ env.HAXE_VERSION }}"
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          haxe -version

      - name: Resolve Rust toolchain policy
        id: rust-policy
        run: node scripts/ci/rust-toolchain-policy.js --github-output --activate release

      - name: Setup reproducible release Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ steps.rust-policy.outputs.release }}

      - name: Derive, package, tag, publish, and verify
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: npx semantic-release
